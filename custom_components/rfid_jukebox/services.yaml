# Describes the services offered by the RFID Jukebox integration.

map_tag:
  name: Map Tag to Folder
  description: Creates a new mapping between an RFID tag ID and a folder name.
  fields:
    tag_id:
      name: Tag ID
      description: The unique identifier of the RFID tag.
      required: true
