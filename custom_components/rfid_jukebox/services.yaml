# Describes the services offered by the RFID Jukebox integration.

map_tag:
  name: Map Tag to Folder
  description: Creates a new mapping between an RFID tag ID and a folder name.
  fields:
    tag_id:
      name: Tag ID
      description: The unique identifier of the RFID tag.
      required: true
      selector:
        text:
    folder_name:
      name: Folder Name
      description: The name of the folder to map.
      required: true
      selector:
        text:
next_track:
  name: Next Track
  description: Plays the next track in the current folder.
previous_track:
  name: Previous Track
  description: Plays the previous track in the current folder.
stop:
  name: Stop
  description: Stops the media player.
